<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saraçoğlu Döner POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=10">
    <meta name="theme-color" id="themeColorMeta" content="#121212">
</head>
<body>

    <header class="top-app-bar" id="topAppBar">
        <div class="header-content">
            <div class="header-left">
                <h1 class="app-title" id="appTitle">SARAÇOĞLU DÖNER <span style="font-size: 0.8rem; color: #888; font-weight: normal;">v5.3.0</span></h1>
                <div class="kasa-status" id="kasaStatus">🔴 Kasa Çevrimdışı</div>
            </div>
            <div style="display: flex; align-items: center;">
                <a href="#" onclick="downloadLatestApk(event)" class="icon-btn" style="color: #3DDC84; text-decoration: none; margin-right: 15px;" title="Android Uygulamasını İndir">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                        <path d="M17.6,9.48l1.84-3.18c0.16-0.31,0.04-0.69-0.26-0.85c-0.31-0.16-0.69-0.04-0.85,0.26L16.42,9.04C15.11,8.39,13.61,8,12,8S8.89,8.39,7.58,9.04L5.67,5.71C5.51,5.41,5.13,5.29,4.83,5.45C4.53,5.61,4.41,5.99,4.57,6.3l1.84,3.18C3.54,11.23,1.5,14.39,1.5,18h21C22.5,14.39,20.46,11.23,17.6,9.48z M7.5,15c-0.55,0-1-0.45-1-1s0.45-1,1-1s1,0.45,1,1S8.05,15,7.5,15z M16.5,15c-0.55,0-1-0.45-1-1s0.45-1,1-1s1,0.45,1,1S17.05,15,16.5,15z"/>
                    </svg>
                <a href="/tv" target="_blank" class="icon-btn" style="color: #FF9800; text-decoration: none; margin-right: 15px; display:flex; align-items:center; gap:5px; font-size:16px; font-weight:bold; width:auto; border-radius:10px; background:#333; padding:0 12px;" title="TV Modunu Ac">
                    📺 TV Modu
                </a>
                <button class="icon-btn" id="settingsBtn">⚙️</button>
            </div>
        </div>
        <button class="back-btn hidden" id="backBtn">< Geri</button>
    </header>

    <nav class="tab-row" id="tabRow">
    </nav>

    <main class="content-area" id="menuArea"></main>

    <main class="content-area hidden" id="masalarArea">
        <div class="masalar-list" id="masalarList"></div>
    </main>

    <!-- Floating Action Button for Masalar -->
    <button class="fab-masalar" id="fabMasalar">Masalar (0)</button>

    <!-- Active Table Bottom Bar -->
    <div class="bottom-app-bar hidden" id="bottomAppBar">
        <div class="bab-info">
            <div class="bab-title" id="babTitle">Masa: </div>
            <div class="bab-subtitle" id="babSubtitle">0 Ürün - 0 ₺</div>
        </div>
        <div class="bab-actions">
            <button class="btn-text" id="babCancel">İptal</button>
            <button class="btn-contained" id="babSend">Siparişi Gönder</button>
        </div>
    </div>

    <!-- Product Bottom Sheet -->
    <div class="overlay" id="sheetOverlay"></div>
    <div class="bottom-sheet" id="productSheet">
        <div class="sheet-drag-handle" style="width: 40px; height: 4px; background: #fff; margin: 0 auto 20px; border-radius: 2px;"></div>
        <div class="sheet-header">
            <h2 id="sheetProductName">Ürün Adı</h2>
            <div class="quantity-selector">
                <button id="qtyMinus">-</button>
                <span id="qtyText">1</span>
                <button id="qtyPlus">+</button>
            </div>
        </div>
        <div class="sheet-content">
            <div class="chips-container" id="optionsContainer" style="margin-bottom: 20px;"></div>
            
            <div id="icerikCikarSection" class="hidden">
                <div class="chips-container" id="icerikCikarContainer"></div>
                
                <hr style="border: none; border-top: 1px solid #333; margin: 15px 0;">
                <div class="chips-container" id="icerikEkleContainer"></div>
                
                <hr style="border: none; border-top: 1px solid #333; margin: 15px 0;">
                <div class="chips-container" id="ucretliEkstralarContainer" style="margin-bottom: 10px;"></div>
                
                <div class="chips-container" id="ucretsizEkstralarContainer" style="margin-bottom: 10px;"></div>
                <div class="chips-container" id="odemeContainer"></div>
            </div>

            <div id="drinksSection" class="hidden">
                <div class="drinks-grid" id="drinksContainer" style="margin-top: 25px;"></div>
            </div>

            <input type="text" class="custom-input" id="noteInput" placeholder="Özel Sipariş Notu (Örn: Çok pişsin)" style="margin-top: 25px;">

            <div id="masaAdiSection">
                <input type="text" class="custom-input" id="masaInput" placeholder="Masa No / İsim" style="margin-top: 15px;">
                <textarea class="custom-input" id="orderNoteInputGlobal" placeholder="Sipariş / Adres Notu" style="margin-top: 5px; font-size: 14px; background: #222; min-height: 60px; resize: vertical;"></textarea>
            </div>

            <button class="btn-massive" id="addToCartBtn">Sepete Ekle - TOPLAM: 0 ₺</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="overlay" id="settingsOverlay"></div>
    <div class="modal" id="settingsModal">
        <h3>⚙️ Ayarlar</h3>
        <p>Siparişlerin yanında görünecek renginizi seçin:</p>
        <div class="color-grid" id="colorGrid"></div>
        <div class="modal-actions">
            <button class="btn-text" id="closeSettingsBtn">İptal</button>
        </div>
    </div>

    <script src="/static/app.js?v=10"></script>
    <script>
        async function downloadLatestApk(e) {
            e.preventDefault();
            try {
                const response = await fetch('https://api.github.com/repos/bilalgnd/saracapp/releases/latest');
                const data = await response.json();
                const apkAsset = data.assets.find(asset => asset.name.endsWith('.apk'));
                if (apkAsset) {
                    window.location.href = apkAsset.browser_download_url;
                } else {
                    alert('APK dosyasi bulunamadi!');
                }
            } catch (err) {
                alert('Guncel surum alinirken hata olustu.');
            }
        }
    </script>
</body>
</html>
